name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the job only reads the checked-out code; it needs no write scopes.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quickstart-arm64:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      # Native ARM64 evidence for the exact user-facing path, including its own
      # locked dependency install. The smoke script enforces <5 minutes.
      - run: npm run quickstart:smoke
        env:
          MUNIN_QUICKSTART_SMOKE_FULL_INSTALL: "1"

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Target Node 20 (engines floor) and 22 (current LTS) — the Pi runs an
        # ARM64 Node in this range; the matrix is cheap drift insurance.
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run typecheck:tools
      - run: npm run build
      # Exercises the actual canonical shell entry point in an isolated
      # data/config root and enforces the five-minute first-success budget.
      - run: npm run quickstart:smoke
      # Runs the full suite with V8 coverage and enforces the ratchet floors
      # in vitest.config.ts (statements/branches/functions/lines). Raise the
      # floors when coverage rises; never lower them to admit a regression.
      - run: npm run test:coverage
      # Retrieval regression gate: deterministic raw/lexical benchmark over a
      # committed synthetic corpus, compared to benchmark/ci-gate/baseline.json.
      # Fails the build if recall/ranking regresses. Re-bless an intentional
      # change with: npm run benchmark:ci-gate -- --update-baseline
      - run: npm run benchmark:ci-gate
      # Hybrid retrieval gate: same corpus, but FTS5 + vector KNN fused by RRF
      # over COMMITTED frozen embedding vectors (no model download — hermetic
      # and deterministic). Guards the raw vector+RRF layer under memory_query's
      # default hybrid mode, which the lexical gate cannot reach. --require-vec
      # makes a missing sqlite-vec a hard failure HERE (it's an environment
      # regression on ubuntu-latest, not a soft skip), so the gate can't silently
      # no-op. Re-bless after a vector/query change with:
      #   npm run benchmark:ci-gate -- --hybrid --update-baseline
      - run: npm run benchmark:ci-gate:hybrid -- --require-vec
