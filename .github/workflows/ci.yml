name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least privilege: the job only reads the checked-out code; it needs no write scopes.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Target Node 20 (engines floor) and 22 (current LTS) — the Pi runs an
        # ARM64 Node in this range; the matrix is cheap drift insurance.
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run typecheck:tools
      - run: npm run build
      # Runs the full suite with V8 coverage and enforces the ratchet floors
      # in vitest.config.ts (statements/branches/functions/lines). Raise the
      # floors when coverage rises; never lower them to admit a regression.
      - run: npm run test:coverage
      # Retrieval regression gate: deterministic raw/lexical benchmark over a
      # committed synthetic corpus, compared to benchmark/ci-gate/baseline.json.
      # Fails the build if recall/ranking regresses. Re-bless an intentional
      # change with: npm run benchmark:ci-gate -- --update-baseline
      - run: npm run benchmark:ci-gate
